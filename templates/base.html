{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}بكالوريا إنكليزي{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'quiz/css/style.css' %}" />
  
  <link rel="manifest" href="{% static 'pwa/manifest.json' %}">

 <!-- service worker -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/serviceworker.js')
        .then(reg => console.log('✅ Service Worker مسجل:', reg.scope))
        .catch(err => console.error('❌ فشل تسجيل Service Worker:', err));
    });
  }
</script>



<div id="install-container">
  <button id="install-btn">📲 تثبيت التطبيق</button>
  <div id="progress-bar">
    <div id="progress"></div>
  </div>
  <div id="progress-text">0%</div>
</div>

  <!-- Bootstrap RTL -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>

  <!-- أيقونة الموقع -->
  <link rel="icon" href="{% static 'pwa/icons/icon-192x192.png' %}" />
  <link rel="apple-touch-icon" href="{% static 'pwa/icons/icon-192x192.png' %}" />
  <meta name="theme-color" content="#4a90e2" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>

  <!-- CSS مخصص -->
  <link rel="stylesheet" href="{% static 'quiz/css/style.css' %}" />

  <!-- تحسينات جمالية -->
  

  {% block extra_head %}{% endblock %}
</head>
<body class="bg-light text-dark d-flex flex-column min-vh-100">

  

  <!-- شريط التنقل -->
  <nav class="navbar navbar-light bg-white border-bottom shadow-sm">
    <div class="container-lg d-flex justify-content-between">
      <button class="btn btn-outline-primary" type="button" data-bs-toggle="offcanvas" data-bs-target="#sideMenu" aria-controls="sideMenu">
        ☰ القائمة
      </button>
         </div>
  </nav>

  <!-- الستارة الجانبية -->
  <div class="offcanvas offcanvas-end" tabindex="-1" id="sideMenu" aria-labelledby="sideMenuLabel">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title" id="sideMenuLabel">القائمة الرئيسية</h5>
      <button type="button" class="btn-close btn-close-white text-reset" data-bs-dismiss="offcanvas" aria-label="إغلاق"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column">
      <a href="#" class="nav-link py-2">الرئيسية</a>
      <a href="#" class="nav-link py-2">من نحن</a>
      <a href="#" class="nav-link py-2">اتصل بنا</a>
      <hr>
      <div class="social-icons mt-3">
        <a href="https://facebook.com" target="_blank" title="فيسبوك"><i class="bi bi-facebook"></i> فيسبوك</a><br />
        <a href="https://wa.me/00963653447860" target="_blank" title="واتساب"><i class="bi bi-whatsapp"></i> واتساب</a>
      </div>
    </div>
  </div>

  <!-- المحتوى الرئيسي -->
  <main class="container-lg flex-fill py-4">
    {% block content %}{% endblock %}
  </main>

  

  <!-- سكريبتات مخصصة -->
  <script src="{% static 'quiz/js/app.js' %}" defer></script>

  <!-- أيقونات Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />

  {% block extra_scripts %}{% endblock %}
</body>
</html>
