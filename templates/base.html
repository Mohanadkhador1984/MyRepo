{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>

    <!-- ملفات التعريف والإعلان عن الـ PWA -->
    <link rel="manifest" href="{% static 'pwa/manifest.json' %}">

    <!-- ملفات CSS الخارجية -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'quiz/css/style.css' %}">

    <!-- تصميم مخصص داخل الصفحة -->
    <style>
        body {
            background: linear-gradient(to right, #d0d0d6, #e5e9f0);
            color: #fff;
        }
        .card {
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            background-color: hsl(0, 0%, 100%);
            color: #000;
        }
        .card-header {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
        }
        .btn-primary {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            border: none;
        }
        .btn-primary:hover {
            background: linear-gradient(to right, #5a0fbf, #1f6ae6);
        }
        .input-group-text {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
        }
    </style>
</head>
<body>
    {% block content %}{% endblock %}

    <!-- تحميل ملف JavaScript مرة واحدة في نهاية الصفحة لتحميل أفضل -->
    <script src="{% static 'quiz/js/app.js' %}"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register("{% static 'pwa/service-worker.js' %}");
        }
    </script>
</body>
</html>
