{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg">
                <div class="card-header text-center bg-warning text-white">
                    <h2>تسجيل الدخول</h2>
                </div>
                <div class="card-body">
                    {% if messages %}
                        <div class="alert alert-danger" role="alert">
                            {% for message in messages %}
                                {{ message }}
                            {% endfor %}
                        </div>
                    {% endif %}
                    <form method="post" action="{% url 'login' %}">
                        {% csrf_token %}
                        <div class="form-group">
                            <label for="username">اسم المستخدم</label>
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                                </div>
                                <input type="text" name="username" class="form-control" id="username" placeholder="أدخل اسم المستخدم" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="password">كلمة المرور</label>
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                </div>
                                <input type="password" name="password" class="form-control" id="password" placeholder="أدخل كلمة المرور" required>
                            </div>
                        </div>
                        <div class="form-group form-check">
                            <input type="checkbox" name="remember_me" class="form-check-input" id="remember_me">
                            <label class="form-check-label" for="remember_me">تذكرني</label>
                        </div>
                        <button type="submit" class="btn btn-warning btn-block">تسجيل الدخول</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
