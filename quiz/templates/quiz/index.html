{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container text-center py-4">

  <h1 class="mb-4 text-primary">تطبيق البكالوريا الإنجليزي</h1>
  <p class="lead text-muted">اختر الفرع ثم الاختبار لبدء التمرين التفاعلي</p>

  <!-- شاشة اختيار الفرع -->
  <div id="branch-screen" class="quiz-container my-4">
    <h3 class="mb-3">اختر الفرع</h3>
    <div class="d-grid gap-3 d-sm-flex justify-content-center">
      <button class="btn btn-outline-primary px-4 py-2" onclick="selectBranch('A')">الفرع الأدبي (A)</button>
      <button class="btn btn-outline-success px-4 py-2" onclick="selectBranch('B')">الفرع العلمي (B)</button>
    </div>
  </div>

 <div id="year-screen" class="quiz-container" style="display:none;">
    <h1>اختر الاختبار</h1>
    <div class="year-selection">
      <button onclick="selectYear(1)">الاختبار الأول</button>
      <button onclick="selectYear(2)">الاختبار الثاني</button>
      <button onclick="selectYear(3)">الاختبار الثالث</button>
      <button onclick="selectYear(4)">الاختبار الرابع</button>
      <button onclick="selectYear(5)">الاختبار الخامس</button>
      <button onclick="selectYear(6)">الاختبار السادس</button>
      <button onclick="selectYear(7)">الاختبار السابع</button>
      <button onclick="selectYear(8)">الاختبار الثامن</button>
      <button onclick="selectYear(9)">الاختبار التاسع</button>
      <button onclick="selectYear(2022)">2022</button>
      <button onclick="selectYear(2023)">2023</button>
      <button onclick="selectYear(2024)">2024</button>
    </div>
  </div>

  <!-- شاشة الاختبار -->
  <div id="quiz-screen" class="quiz-container my-4 d-none">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div class="text-success fw-bold" id="score-summary">إجابات صحيحة: 0 | خاطئة: 0</div>
      <div class="text-danger fw-bold" id="timer">00:90:00</div>
    </div>

    <div class="mb-3">
      <select id="question-jump" class="form-select" onchange="jumpToQuestion(this.value)">
        <option value="">انتقل إلى سؤال</option>
      </select>
    </div>

    <h4 id="question" class="mb-3">جاري التحميل...</h4>
    <div id="answers" class="answers mb-4"></div>

    <div class="d-flex justify-content-between">
      <button class="btn btn-outline-secondary" onclick="prevQuestion()">السابق</button>
      <button id="next-btn" class="btn btn-primary" onclick="nextQuestion()">التالي</button>
    </div>

    <div class="floating-info mt-4">
      <button class="btn btn-outline-dark me-2" onclick="openTextScreen()" id="text-button" style="display: none;">📝 النص</button>
      <button class="btn btn-outline-dark" onclick="toggleLanguage()">🌐 اللغة</button>
    </div>

    <div id="result" class="mt-3"></div>
  </div>

  <!-- شاشة النص المرفق -->
  <div id="text-screen" class="quiz-container d-none my-4">
    <h3 class="mb-3">النص المرفق</h3>
    <div id="attached-text" class="border p-3 rounded bg-light"></div>
  </div>

  <!-- زر الرجوع للرئيسية -->
  <button id="home-button" onclick="goHome()" title="العودة للرئيسية" class="btn btn-light rounded-circle shadow position-fixed bottom-0 end-0 m-4">
    🏠
  </button>

  <!-- زر التثبيت PWA -->
  <button id="install-btn" class="btn btn-success position-fixed bottom-0 start-0 m-4 d-none" style="z-index: 1000;">
    📲 تثبيت التطبيق
  </button>

</div>

<!-- تسجيل Service Worker -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/serviceworker.js')
        .then(reg => console.log('✅ Service Worker مسجل:', reg.scope))
        .catch(err => console.error('❌ فشل تسجيل Service Worker:', err));
    });
  }
</script>

<!-- سكريبت التطبيق -->
<script src="{% static 'quiz/js/app.js' %}" defer></script>
{% endblock %}
